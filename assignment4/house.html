<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spökhusbyrån AB</title>
  <link rel="stylesheet" href="css/assignment4.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/house.js"></script>
  <script type="module" src="../js/main.js"></script>
</head>

<body data-page="house">
  <header>
    <h1>Spökhusbyrån AB</h1>
    <p class="tagline">Vi hyr ut hemsökta hus till modiga semesterfirare</p>
  </header>

  <main>
    <a href="index.html" class="back-link">&larr; Tillbaka till alla hus</a>

    <div id="error-message" class="error hidden"></div>

    <article id="detail"></article>

    <section id="map-box">
      <h2>Var ligger huset?</h2>
      <div id="map"></div>
      <p id="address"></p>
    </section>

    <section id="booking">
      <h2>Boka ditt äventyr</h2>

      <form id="form">
        <div class="field">
          <label for="checkin">Incheckningsdatum</label>
          <input type="date" id="checkin">
        </div>

        <div class="field">
          <label for="days">Antal dagar</label>
          <input type="number" id="days" min="1" value="1">
        </div>

        <div class="field">
          <label>Tillägg</label>
          <label class="addon">
            <input type="checkbox" name="addon" value="breakfast" data-price="100">
            Frukost (+100 kr/dag)
          </label>
          <label class="addon">
            <input type="checkbox" name="addon" value="tour" data-price="300">
            Spökvandring (+300 kr)
          </label>
          <label class="addon">
            <input type="checkbox" name="addon" value="seance" data-price="500">
            Nattlig seans (+500 kr)
          </label>
        </div>

        <div class="field">
          <label for="promo">Kampanjkod (valfritt)</label>
          <input type="text" id="promo" placeholder="t.ex. GHOST20">
        </div>

        <div id="total">
          <p>Totalt pris: <span id="total-price">0</span> kr</p>
        </div>

        <div id="errors" class="error hidden"></div>

        <button type="submit" class="btn">Boka nu</button>
      </form>

      <div id="confirmation" class="hidden"></div>
    </section>
  </main>

  <footer>
    <p>Kevin Truong</p>
    <p>Kurs: Webbteknik 3 (1ME323)</p>
    <p>GitHub: WiLdPUG</p>
  </footer>
</body>

</html>
